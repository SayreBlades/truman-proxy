services:
  agent:
    build:
      context: .
      additional_contexts:
        skills: ~/.pi/agent/skills
    stdin_open: true       # -i
    tty: true              # -t
    volumes:
      - .:/workspace
      - pi-data:/home/pi/.pi/agent
    env_file:
      - path: .env
        required: false
    working_dir: /workspace

volumes:
  pi-data:
